# Workflow for building and deploying a Next.js static site to GitHub Pages
#
# This workflow:
#   1. Installs dependencies (npm install, since no lock file is committed)
#   2. Builds a static export via `next build` (output: 'export' in next.config.ts)
#   3. Uploads the ./out directory as a Pages artifact
#   4. Deploys to GitHub Pages
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Ensure ESLint is skipped during build
        run: |
          # configure-pages may overwrite next.config.ts — ensure eslint ignore is present
          if ! grep -q "ignoreDuringBuilds" next.config.ts 2>/dev/null; then
            sed -i 's/const nextConfig/const nextConfig/' next.config.ts
            sed -i '/reactStrictMode/a\  eslint: { ignoreDuringBuilds: true },' next.config.ts 2>/dev/null || true
          fi
          echo "--- next.config.ts ---"
          cat next.config.ts

      - name: Install dependencies
        run: npm install

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build with Next.js
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
